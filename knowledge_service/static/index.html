<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi · agent</title>

<!-- Marked.js for markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

<style>
  :root {
    --bg:        #0e0e0e;
    --bg2:       #141414;
    --bg3:       #1a1a1a;
    --border:    #2a2a2a;
    --dim:       #444;
    --muted:     #666;
    --text:      #c8c8c8;
    --bright:    #e8e8e8;
    --green:     #4ec94e;
    --yellow:    #d4a843;
    --red:       #c0392b;
    --blue:      #5b9bd5;
    --font:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    height: 38px;
    flex-shrink: 0;
  }
  #topbar .logo { color: var(--green); font-weight: 700; letter-spacing: 2px; font-size: 12px; }
  #topbar nav { display: flex; gap: 12px; }
  #topbar nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 2px 0;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  #topbar nav a.active, #topbar nav a:hover { color: var(--bright); border-bottom-color: var(--green); }
  #topbar .spacer { flex: 1; }
  #llm-indicator { font-size: 11px; color: var(--muted); }
  #llm-indicator span { color: var(--blue); }

  /* ── page layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }
  .page { display: none; flex: 1; overflow: hidden; }
  .page.active { display: flex; }

  /* ════════════════════════════════════
     CHAT PAGE
  ════════════════════════════════════ */
  #page-chat { flex-direction: row; }

  /* sidebar */
  #sidebar {
    width: 280px;
    min-width: 280px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
  }
  #sidebar-header {
    padding: 10px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  #tool-calls {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #tool-calls::-webkit-scrollbar { width: 4px; }
  #tool-calls::-webkit-scrollbar-track { background: transparent; }
  #tool-calls::-webkit-scrollbar-thumb { background: var(--border); }

  /* tool call card */
  .tool-card {
    border: 1px solid var(--border);
    margin-bottom: 8px;
    animation: fadeSlideIn 0.2s ease;
  }
  .tool-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    cursor: pointer;
    background: var(--bg3);
    user-select: none;
  }
  .tool-card-header:hover { background: #1f1f1f; }
  .tool-status {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .tool-status.done { background: var(--green); }
  .tool-status.error { background: var(--red); }
  .tool-name { color: var(--bright); font-size: 12px; flex: 1; }
  .tool-toggle { color: var(--dim); font-size: 10px; }
  .tool-body { display: none; padding: 8px 10px; border-top: 1px solid var(--border); }
  .tool-body.open { display: block; }
  .tool-section-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
  .tool-code {
    background: var(--bg);
    padding: 6px 8px;
    font-size: 11px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
    margin-bottom: 8px;
  }
  .tool-code::-webkit-scrollbar { width: 3px; }
  .tool-code::-webkit-scrollbar-thumb { background: var(--border); }

  /* main chat area */
  #chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* agent selector bar */
  #agent-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  #agent-bar label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  #agent-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--bright);
    font-family: var(--font);
    font-size: 12px;
    padding: 3px 8px;
    outline: none;
    cursor: pointer;
  }
  #agent-select:focus { border-color: var(--green); }
  #session-id-display { font-size: 10px; color: var(--dim); margin-left: auto; }
  #new-session-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  #new-session-btn:hover { color: var(--bright); border-color: var(--dim); }

  /* messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
    animation: fadeIn 0.2s ease;
  }
  .msg-meta {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .msg.user .msg-meta { color: var(--muted); }
  .msg.assistant .msg-meta { color: var(--green); }

  .msg-bubble {
    padding: 0;
    max-width: 100%;
  }
  .msg.user .msg-bubble {
    color: var(--text);
    border-left: 2px solid var(--dim);
    padding-left: 10px;
  }
  .msg.assistant .msg-bubble { color: var(--bright); }

  /* markdown output */
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
    color: var(--bright);
    font-size: 13px;
    margin: 10px 0 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .msg-bubble code {
    background: var(--bg3);
    padding: 1px 5px;
    font-family: var(--font);
    font-size: 12px;
    color: var(--yellow);
  }
  .msg-bubble pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 10px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .msg-bubble pre code {
    background: none;
    padding: 0;
    color: var(--text);
  }
  .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin-bottom: 8px; }
  .msg-bubble li { margin-bottom: 2px; }
  .msg-bubble blockquote {
    border-left: 2px solid var(--dim);
    padding-left: 10px;
    color: var(--muted);
    margin: 6px 0;
  }
  .msg-bubble a { color: var(--blue); text-decoration: none; }
  .msg-bubble a:hover { text-decoration: underline; }
  .msg-bubble table { border-collapse: collapse; margin: 6px 0; }
  .msg-bubble th, .msg-bubble td {
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-size: 12px;
  }
  .msg-bubble th { color: var(--bright); }

  /* thinking block */
  .thinking-wrapper { margin-bottom: 6px; }
  .thinking-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 2px 0;
    border-bottom: 1px dashed transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .thinking-toggle:hover { color: var(--text); border-bottom-color: var(--dim); }
  .thinking-cursor {
    display: inline-block;
    color: var(--yellow);
    animation: blink 1s step-end infinite;
    font-size: 14px;
    line-height: 1;
  }
  .thinking-cursor.done { animation: none; color: var(--dim); }
  .thinking-content {
    display: none;
    background: var(--bg3);
    border-left: 2px solid var(--dim);
    padding: 8px 12px;
    margin-top: 4px;
    font-size: 11px;
    color: var(--muted);
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    animation: fadeIn 0.15s ease;
  }
  .thinking-content::-webkit-scrollbar { width: 3px; }
  .thinking-content::-webkit-scrollbar-thumb { background: var(--border); }
  .thinking-content.open { display: block; }

  /* input area */
  #input-area {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--bg2);
    flex-shrink: 0;
  }
  #input-prompt { color: var(--green); font-size: 14px; padding-bottom: 2px; flex-shrink: 0; }
  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--bright);
    font-family: var(--font);
    font-size: 13px;
    resize: none;
    overflow-y: hidden;
    min-height: 22px;
    max-height: 160px;
    line-height: 1.6;
  }
  #send-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 1px;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s;
    align-self: flex-end;
  }
  #send-btn:hover:not(:disabled) { color: var(--green); border-color: var(--green); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ════════════════════════════════════
     CONFIG PAGE
  ════════════════════════════════════ */
  #page-config {
    flex-direction: column;
    overflow-y: auto;
    padding: 24px;
  }
  #page-config::-webkit-scrollbar { width: 4px; }
  #page-config::-webkit-scrollbar-thumb { background: var(--border); }

  .config-section { margin-bottom: 32px; max-width: 860px; }
  .config-section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* table */
  .data-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .data-table th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .data-table td {
    padding: 7px 10px;
    border-bottom: 1px solid #1e1e1e;
    font-size: 12px;
    color: var(--text);
    vertical-align: top;
  }
  .data-table tr:hover td { background: var(--bg3); }
  .badge {
    font-size: 10px;
    padding: 1px 6px;
    letter-spacing: 1px;
  }
  .badge.valid   { color: var(--green);  border: 1px solid var(--green);  }
  .badge.invalid { color: var(--red);    border: 1px solid var(--red);    }
  .badge.pending { color: var(--yellow); border: 1px solid var(--yellow); }

  /* forms */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  .field input, .field select, .field textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--bright);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green); }
  .field textarea { resize: vertical; min-height: 60px; }

  /* CodeMirror override */
  .CodeMirror {
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 12px;
    height: 180px;
    background: var(--bg3);
  }
  .CodeMirror-focused { border-color: var(--green); }
  .CodeMirror-scroll { padding: 4px; }

  .btn-row { display: flex; gap: 8px; }
  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn:hover { color: var(--bright); border-color: var(--dim); }
  .btn.primary:hover { color: var(--green); border-color: var(--green); }
  .btn.danger:hover  { color: var(--red);   border-color: var(--red);   }

  .status-msg {
    font-size: 11px;
    padding: 4px 0;
    min-height: 20px;
    transition: opacity 0.3s;
  }
  .status-msg.ok  { color: var(--green); }
  .status-msg.err { color: var(--red); }

  /* ── animations ── */
  @keyframes fadeIn       { from { opacity: 0; }                         to { opacity: 1; } }
  @keyframes fadeSlideIn  { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes blink        { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span class="logo">pi·agent</span>
    <nav>
      <a href="#" class="active" data-page="chat">chat</a>
      <a href="#" data-page="config">config</a>
    </nav>
    <div class="spacer"></div>
    <div id="llm-indicator">llm: <span id="llm-name-display">env default</span></div>
  </div>

  <!-- ══ CHAT PAGE ══ -->
  <div id="page-chat" class="page active">

    <!-- sidebar: tool calls -->
    <div id="sidebar">
      <div id="sidebar-header">tool calls</div>
      <div id="tool-calls"><p style="padding:10px;color:var(--dim);font-size:11px">no tool calls yet</p></div>
    </div>

    <!-- main chat -->
    <div id="chat-main">
      <div id="agent-bar">
        <label>agent</label>
        <select id="agent-select"><option value="">— select —</option></select>
        <div id="session-id-display">no session</div>
        <button id="new-session-btn">new session</button>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <span id="input-prompt">&gt;</span>
        <textarea id="user-input" rows="1" placeholder="type a message..."></textarea>
        <button id="send-btn">send</button>
      </div>
    </div>
  </div>

  <!-- ══ CONFIG PAGE ══ -->
  <div id="page-config" class="page">

    <!-- LLMs -->
    <div class="config-section">
      <div class="config-section-title">llm configurations</div>
      <table class="data-table" id="llm-table">
        <thead><tr><th>name</th><th>model</th><th>base url</th><th>format</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="form-grid" id="llm-form">
        <div class="field"><label>name</label><input id="llm-name" placeholder="gpt4o"></div>
        <div class="field"><label>model name</label><input id="llm-model" placeholder="gpt-4o"></div>
        <div class="field"><label>base url</label><input id="llm-url" placeholder="https://api.openai.com/v1"></div>
        <div class="field"><label>api key</label><input id="llm-key" type="password" placeholder="sk-..."></div>
        <div class="field"><label>api format</label>
          <select id="llm-format">
            <option value="completion">completion</option>
            <option value="response">response</option>
            <option value="anthropic">anthropic</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="saveLLM()">add llm</button>
      </div>
      <div class="status-msg" id="llm-status"></div>
    </div>

    <!-- Agents -->
    <div class="config-section">
      <div class="config-section-title">agents</div>
      <table class="data-table" id="agent-table">
        <thead><tr><th>name</th><th>llm</th><th>tools</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="form-grid" id="agent-form">
        <div class="field"><label>name</label><input id="ag-name" placeholder="my-agent"></div>
        <div class="field"><label>llm (optional)</label><input id="ag-llm" placeholder="leave blank for env default"></div>
        <div class="field form-full"><label>system prompt</label><textarea id="ag-prompt" rows="3"></textarea></div>
        <div class="field form-full"><label>tool types (comma separated)</label><input id="ag-tools" placeholder="parsa, my_tool"></div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="saveAgent()">add agent</button>
      </div>
      <div class="status-msg" id="agent-status"></div>
    </div>

    <!-- Tools -->
    <div class="config-section">
      <div class="config-section-title">dynamic tools</div>
      <table class="data-table" id="tool-table">
        <thead><tr><th>name</th><th>status</th><th>entry point</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="form-grid" id="tool-form">
        <div class="field"><label>name</label><input id="t-name" placeholder="fetch_price"></div>
        <div class="field"><label>entry point</label><input id="t-entry" placeholder="run" value="run"></div>
        <div class="field form-full"><label>description</label><input id="t-desc" placeholder="What this tool does"></div>
        <div class="field form-full">
          <label>parameters (JSON schema)</label>
          <textarea id="t-params" rows="3" placeholder='{ "type": "object", "properties": { "query": { "type": "string" } }, "required": ["query"] }'></textarea>
        </div>
        <div class="field form-full">
          <label>code (python)</label>
          <textarea id="t-code-raw"></textarea>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="saveTool()">register tool</button>
      </div>
      <div class="status-msg" id="tool-status"></div>
    </div>

  </div><!-- /page-config -->
</div><!-- /app -->

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentAgent = null;
let currentSessionId = null;
let isStreaming = false;
let codeEditor = null;

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
document.querySelectorAll('#topbar nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const page = a.dataset.page;
    document.querySelectorAll('#topbar nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if (page === 'config') loadConfigData();
  });
});

// ═══════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════
const api = {
  get:    (u)    => fetch(u).then(r => r.json()),
  post:   (u,b)  => fetch(u, {method:'POST',  headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)}).then(r => r.json()),
  patch:  (u,b)  => fetch(u, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)}).then(r => r.json()),
  delete: (u)    => fetch(u, {method:'DELETE'}).then(r => r.json()),
};

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  await loadAgentSelect();
  initCodeEditor();
}

async function loadAgentSelect() {
  const agents = await api.get('/agents');
  const sel = document.getElementById('agent-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— select —</option>';
  const list = Array.isArray(agents) ? agents : [agents];
  list.forEach(a => {
    const o = document.createElement('option');
    o.value = a.name; o.textContent = a.name;
    if (a.name === prev) o.selected = true;
    sel.appendChild(o);
  });
  if (prev && list.find(a => a.name === prev)) currentAgent = prev;
}

document.getElementById('agent-select').addEventListener('change', function() {
  currentAgent = this.value || null;
  currentSessionId = null;
  document.getElementById('session-id-display').textContent = 'no session';
  updateLLMIndicator();
});

async function updateLLMIndicator() {
  if (!currentAgent) { document.getElementById('llm-name-display').textContent = 'env default'; return; }
  try {
    const a = await api.get('/agents?name=' + encodeURIComponent(currentAgent));
    document.getElementById('llm-name-display').textContent = a.llm_name || 'env default';
  } catch {}
}

document.getElementById('new-session-btn').addEventListener('click', () => {
  currentSessionId = null;
  document.getElementById('session-id-display').textContent = 'no session';
  clearMessages();
  clearToolCalls();
});

// ═══════════════════════════════════════════
// AUTO-EXPAND TEXTAREA
// ═══════════════════════════════════════════
const userInput = document.getElementById('user-input');
userInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});
userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById('send-btn').addEventListener('click', sendMessage);

// ═══════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════
async function sendMessage() {
  if (isStreaming) return;
  const text = userInput.value.trim();
  if (!text || !currentAgent) return;

  userInput.value = '';
  userInput.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isStreaming = true;

  appendUserMessage(text);
  const { thinkingEl, contentEl, msgEl } = appendAssistantMessage();

  let thinkingText = '';
  let responseText = '';
  let toolCallsInProgress = {};

  try {
    const body = { agent_name: currentAgent, query: text };
    if (currentSessionId) body.session_id = currentSessionId;

    const res = await fetch('/ask/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }
        handleSSE(evt, { thinkingEl, contentEl, msgEl }, thinkingText, responseText, toolCallsInProgress);
        if (evt.type === 'thinking_delta') thinkingText += evt.delta;
        if (evt.type === 'text_delta')     responseText += evt.delta;
        if (evt.type === 'session_id') {
          currentSessionId = evt.session_id;
          document.getElementById('session-id-display').textContent = 'session: ' + evt.session_id.slice(0, 8) + '...';
        }
        if (evt.type === 'agent_end') break;
      }
    }
  } catch(e) {
    appendError(e.message);
  }

  // finalize thinking cursor
  const cursor = thinkingEl.querySelector('.thinking-cursor');
  if (cursor) cursor.classList.add('done');
  const label = thinkingEl.querySelector('.thinking-toggle span');
  if (label && thinkingText) label.textContent = 'thinking';

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  scrollToBottom();
}

function handleSSE(evt, { thinkingEl, contentEl }, thinkingText, responseText, toolCallsInProgress) {
  if (evt.type === 'thinking_delta') {
    const tc = thinkingEl.querySelector('.thinking-content');
    const tog = thinkingEl.querySelector('.thinking-toggle');
    tog.style.display = 'inline-flex';
    tc.textContent = (tc.textContent || '') + evt.delta;
    scrollToBottom();
  }

  if (evt.type === 'text_delta') {
    // hide thinking cursor once text starts
    const tog = thinkingEl.querySelector('.thinking-toggle');
    if (tog) {
      const cur = tog.querySelector('.thinking-cursor');
      if (cur && !cur.classList.contains('done') && !thinkingText) {
        tog.style.display = 'none'; // no thinking, hide entirely
      }
    }
    responseText += evt.delta;
    contentEl.innerHTML = marked.parse(responseText);
    scrollToBottom();
  }

  if (evt.type === 'tool_call') {
    toolCallsInProgress[evt.tool_call_id] = evt.tool_name;
    addToolCallCard(evt.tool_call_id, evt.tool_name, evt.arguments);
  }

  if (evt.type === 'tool_result') {
    updateToolCallCard(evt.tool_call_id, evt.content, evt.is_error);
  }
}

// ═══════════════════════════════════════════
// MESSAGE DOM HELPERS
// ═══════════════════════════════════════════
function appendUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-meta">you</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  document.getElementById('messages').appendChild(div);
  scrollToBottom();
}

function appendAssistantMessage() {
  const msgEl = document.createElement('div');
  msgEl.className = 'msg assistant';

  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'thinking-wrapper';
  thinkingEl.innerHTML = `
    <div class="thinking-toggle" style="display:inline-flex">
      <span class="thinking-cursor">▋</span>
      <span style="font-size:11px;color:var(--dim)">thinking...</span>
    </div>
    <div class="thinking-content"></div>
  `;
  thinkingEl.querySelector('.thinking-toggle').addEventListener('click', () => {
    thinkingEl.querySelector('.thinking-content').classList.toggle('open');
  });

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-bubble';

  msgEl.appendChild(document.createElement('div')).className = 'msg-meta';
  msgEl.querySelector('.msg-meta').textContent = 'assistant';
  msgEl.appendChild(thinkingEl);
  msgEl.appendChild(contentEl);
  document.getElementById('messages').appendChild(msgEl);
  scrollToBottom();
  return { thinkingEl, contentEl, msgEl };
}

function appendError(msg) {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="msg-meta" style="color:var(--red)">error</div><div class="msg-bubble" style="color:var(--red)">${escapeHtml(msg)}</div>`;
  document.getElementById('messages').appendChild(div);
  scrollToBottom();
}

function clearMessages() { document.getElementById('messages').innerHTML = ''; }

function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ═══════════════════════════════════════════
// TOOL CALL SIDEBAR
// ═══════════════════════════════════════════
function addToolCallCard(id, name, args) {
  const tc = document.getElementById('tool-calls');
  // remove placeholder
  const ph = tc.querySelector('p');
  if (ph) ph.remove();

  const card = document.createElement('div');
  card.className = 'tool-card';
  card.dataset.id = id;
  card.innerHTML = `
    <div class="tool-card-header">
      <div class="tool-status" id="ts-${id}"></div>
      <div class="tool-name">${escapeHtml(name)}</div>
      <div class="tool-toggle">▾</div>
    </div>
    <div class="tool-body" id="tb-${id}">
      <div class="tool-section-label">INPUT</div>
      <div class="tool-code">${escapeHtml(JSON.stringify(args, null, 2))}</div>
      <div class="tool-section-label" id="tol-${id}" style="display:none">OUTPUT</div>
      <div class="tool-code" id="to-${id}" style="display:none"></div>
    </div>
  `;
  card.querySelector('.tool-card-header').addEventListener('click', () => {
    card.querySelector('.tool-body').classList.toggle('open');
  });
  tc.appendChild(card);
  tc.scrollTop = tc.scrollHeight;
}

function updateToolCallCard(id, content, isError) {
  const status = document.getElementById('ts-' + id);
  const outLabel = document.getElementById('tol-' + id);
  const out = document.getElementById('to-' + id);
  if (status) { status.classList.add(isError ? 'error' : 'done'); }
  if (outLabel) outLabel.style.display = 'block';
  if (out) { out.textContent = content; out.style.display = 'block'; }
  // auto-open card on completion
  const body = document.getElementById('tb-' + id);
  if (body) body.classList.add('open');
}

function clearToolCalls() {
  document.getElementById('tool-calls').innerHTML = '<p style="padding:10px;color:var(--dim);font-size:11px">no tool calls yet</p>';
}

// ═══════════════════════════════════════════
// CONFIG DATA
// ═══════════════════════════════════════════
async function loadConfigData() {
  await Promise.all([loadLLMTable(), loadAgentTable(), loadToolTable()]);
}

async function loadLLMTable() {
  const data = await api.get('/llms');
  const list = Array.isArray(data) ? data : [data];
  const tbody = document.querySelector('#llm-table tbody');
  tbody.innerHTML = '';
  list.forEach(l => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(l.name)}</td>
      <td>${escapeHtml(l.model_name)}</td>
      <td style="color:var(--dim);font-size:11px">${escapeHtml(l.base_url)}</td>
      <td>${escapeHtml(l.api_format)}</td>
      <td><button class="btn danger" onclick="deleteLLM('${escapeHtml(l.name)}')">del</button></td>
    `;
    tbody.appendChild(tr);
  });
}

async function loadAgentTable() {
  const data = await api.get('/agents');
  const list = Array.isArray(data) ? data : [data];
  const tbody = document.querySelector('#agent-table tbody');
  tbody.innerHTML = '';
  list.forEach(a => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(a.name)}</td>
      <td style="color:var(--blue)">${escapeHtml(a.llm_name || 'env default')}</td>
      <td style="color:var(--dim);font-size:11px">${(a.tool_types||[]).join(', ')}</td>
      <td><button class="btn danger" onclick="deleteAgent('${escapeHtml(a.name)}')">del</button></td>
    `;
    tbody.appendChild(tr);
  });
  // also refresh chat selector
  await loadAgentSelect();
}

async function loadToolTable() {
  const data = await api.get('/tools');
  const list = Array.isArray(data) ? data : [data];
  const tbody = document.querySelector('#tool-table tbody');
  tbody.innerHTML = '';
  list.forEach(t => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(t.name)}</td>
      <td><span class="badge ${t.status}">${t.status}</span>${t.error ? `<br><span style="color:var(--red);font-size:10px">${escapeHtml(t.error)}</span>` : ''}</td>
      <td>${escapeHtml(t.entry_point)}</td>
      <td><button class="btn danger" onclick="deleteTool('${escapeHtml(t.name)}')">del</button></td>
    `;
    tbody.appendChild(tr);
  });
}

// ── LLM save/delete ──
async function saveLLM() {
  const body = {
    name:       document.getElementById('llm-name').value.trim(),
    model_name: document.getElementById('llm-model').value.trim(),
    base_url:   document.getElementById('llm-url').value.trim(),
    api_key:    document.getElementById('llm-key').value.trim(),
    api_format: document.getElementById('llm-format').value,
  };
  if (!body.name || !body.model_name || !body.base_url || !body.api_key) {
    setStatus('llm-status', 'all fields required', false); return;
  }
  const res = await api.post('/llms', body);
  if (res.name) { setStatus('llm-status', 'saved: ' + res.name, true); loadLLMTable(); }
  else setStatus('llm-status', res.detail || 'error', false);
}
async function deleteLLM(name) {
  await api.delete('/llms?name=' + encodeURIComponent(name));
  loadLLMTable();
}

// ── Agent save/delete ──
async function saveAgent() {
  const body = {
    name:          document.getElementById('ag-name').value.trim(),
    system_prompt: document.getElementById('ag-prompt').value.trim(),
    tool_types:    document.getElementById('ag-tools').value.split(',').map(s=>s.trim()).filter(Boolean),
    llm_name:      document.getElementById('ag-llm').value.trim() || null,
  };
  if (!body.name || !body.system_prompt) { setStatus('agent-status', 'name and prompt required', false); return; }
  const res = await api.post('/agents', body);
  if (res.name) { setStatus('agent-status', 'saved: ' + res.name, true); loadAgentTable(); }
  else setStatus('agent-status', res.detail || 'error', false);
}
async function deleteAgent(name) {
  await api.delete('/agents?name=' + encodeURIComponent(name));
  loadAgentTable();
}

// ── Tool save/delete ──
function initCodeEditor() {
  codeEditor = CodeMirror.fromTextArea(document.getElementById('t-code-raw'), {
    mode: 'python',
    theme: 'monokai',
    lineNumbers: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    lineWrapping: false,
    value: 'def run(query: str) -> str:\n    r = requests.get("https://example.com", params={"q": query})\n    return r.text\n',
  });
  codeEditor.setValue('def run(query: str) -> str:\n    r = requests.get("https://example.com", params={"q": query})\n    return r.text\n');
}
async function saveTool() {
  let params;
  try { params = JSON.parse(document.getElementById('t-params').value || '{}'); }
  catch { setStatus('tool-status', 'invalid JSON in parameters', false); return; }
  const body = {
    name:        document.getElementById('t-name').value.trim(),
    description: document.getElementById('t-desc').value.trim(),
    parameters:  params,
    code:        codeEditor ? codeEditor.getValue() : '',
    entry_point: document.getElementById('t-entry').value.trim() || 'run',
  };
  if (!body.name || !body.description || !body.code) {
    setStatus('tool-status', 'name, description and code required', false); return;
  }
  const res = await api.post('/tools', body);
  if (res.name) {
    const ok = res.status === 'valid';
    setStatus('tool-status', ok ? 'registered: ' + res.name : 'saved (invalid): ' + (res.error || ''), ok);
    loadToolTable();
  } else setStatus('tool-status', res.detail || 'error', false);
}
async function deleteTool(name) {
  await api.delete('/tools?name=' + encodeURIComponent(name));
  loadToolTable();
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function setStatus(id, msg, ok) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status-msg ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.textContent = ''; el.className = 'status-msg'; }, 4000);
}

function escapeHtml(str) {
  if (typeof str !== 'string') str = JSON.stringify(str) || '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

marked.setOptions({ breaks: true, gfm: true });

init();
</script>
